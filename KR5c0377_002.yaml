front:
  text: 德經篇章玄頌卷下淵四
  hash: sha256:f3dd4017fd4948744732df945e2f76eec155e6561e5a37cd941f9bb0b9cddbb6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0377_HFL_002-001a, image: hfl/0615/0615-005.png}
body:
  text: 新授郢州防禦判官將仕郎試大理司直兼監察御史宋鸞上德不德章第三十八須知上德寧求報求報還嫌量有涯德經注云上德之人施不求報下德之人施必望報應道持心常處厚德經注云應道之君有非常拯拔生靈之功功行圓備感化潜通是能處道德之淳厚不處禮義之華薄無爲弘志不居華德經注云有爲者道之薄禮義者德之華故聖人處無爲之事居其厚不處其薄矣退禮義之行去其華自居其實矣三皇淳朴眞堪慕六國澆醨未足誇德經注云論禮於淳朴之代非狂則勃忘禮於澆醨之日非愚則誣若能解而更張者當退禮而行義退義而行仁退仁而行德忘德而合道人返淳朴則上德之無所爲治國陰功功最大却勝金鼎鍊丹砂義皇畫卦以興文軒后懸鏡以靜亂陶堯垂衣虞舜舞羽大禹治水成湯開網咸有治世大功致生民於仁壽之域豈鍊丹獨善可齊其道德乎昔之得一章第三十九侯王得一撫寰瀛德經云侯王得一爲天下正也法道精靈萬物生德經注云萬物法道精靈故能生成而不滅顯諭無輿忘大號因徵不穀自爲名德經注云輿者車之别名全而言之即謂之輿散謂數之乃輪轅轄輻其名各異則無輿矣亦如王侯自謂孤寡不穀散其尊大之名歸於以賤爲本是謂深得謙沖之道高天虚靜群星朗德經注云天法道之清虚故能尊高不爲萬物污濁厚地安寧九野平德經注云地法道之柔順故能安寧久載萬類而不傾動也功想軒皇弘濟活緱山輕舉獨修行軒皇平蚩尤之難濟活萬彙蒼生受福永播盛美王子晋雖吹笙感鳳度世乘龍獨善其身顧塵埃而不染垂恩及物實拯拔而無施返者道之動章第四十君扣玄關莫倦勞出塵靈跡顯松喬赤松子王喬並前古得道度世之人安寧地軸生成廣運動天機氣序調德經注云譬如天之剛健晝夜運動日月四氣往返周行常不休息以諭修道之人若能清心運動身中之氣日夜往返常不休息亦同天長又注云天地之物乃萬物也有即道也道能生成萬物是知天地之物生於有也言萬物若得天地元和剛柔動用之道則當長生速化故云天地之物生於有有生於無也賢相謀猷方濟治德經注云行權者貴返於實用有者必資於無若能兩忘權實雙泯有無即輔相濟治之理也至人修習正逍遥修身之人黜去聰明韜光修習潜樂逍遥固不知輔相匡濟之道治身治國陰功足自有途程絳闕朝若治身全氣治國成功必繼赤松王喬同朝絳闕上士聞道章第四十一上中下士皆聞道取捨萌心即不同刻志勤行分了悟迷心大笑是愚蒙德經云上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道也進如舉步臨深谷德經云進道若退也明似浮雲映遠空德經注云明於道者蒙昩其跡以養於正乃聖功也修德若偷功行足姓名潜紀玉皇宫德經注云德行内修外若偷竊不欲人知立功而不衒也道生一章第四十二教人柔弱貴身全德經注云人君所欲教人者當以柔弱謙虚之義教之也須信强梁失自然德經云强梁者不得其死也損志持謙高德嶽德經注云王侯能以孤寡爲名卑以自牧豈非損之而益乎益情多欲亂心田德經注云愚者貪冒以求進財復苟得豈非益之而損乎月懸秋色澄千里江沸濤聲動百川越相芳塵輕世事清風明月五湖船范蠡辭榮遁越遂性五湖可謂道符先覺也天下之至柔章第四十三至柔馳騁至堅時德經注云夭下至柔者正性也若馳騁世務染雜塵境情欲充塞則爲夭下至堅是時至柔馳騁至堅之間即顯彰至堅不及至柔之性塵境難迷獨守夷德經注云無有者不染塵境令心中一無所有獨守希夷清靜妙體混成一無間阻不爲可欲所亂也須信不言非杜口德經注云所謂不言非關杜口在理既即有即無在教亦即言即默亦如言滿夭下無口過之教也始明有益自无爲德經注云吾是知无之有益霜前唳鶴聞天韻雪際貞松出俗姿德經注云吾身心清靜則能合道身靜心清忘嗜欲玉京存想是前期若能宗道必見玉京之岐路也名與身孰親章第四十四最痛多藏必厚亡德經云多藏必厚亡若能知止即賢良德經注云知止不殆貪名觸患身如喪潤屋豐財事可傷德經注云徇貨者將以求財財得身亡身貨孰多故令擲玉毁珠以全其和也嗟乎苟貪財身喪縱積玉于家又何貴乎風過未央揺茂草未央宫蕭何所修千門萬户爲天下壯麗今則鞠爲茂草基址空存睹此廢興足誡貪欲水流金谷帶斜陽金谷園昔之貴盛備載簡書今則野水穿流倐爲廢塢斜陽一照能不悲乎全眞法道心無欲應笑隋侯寳夜光德經注云名者實之賔而代人徇名以亡身欲令去功而全其眞也大成若缺章第四十五躁靜不關懷抱者須弘齊物出塵心德經云躁勝寒靜勝熱又注云唯有清靜無爲之人心安志定方能躁勝不寒靜勝不熱泯其躁靜乃爲天下正直思汲黯無人繼德經注云大直若屈汲黯漢之眞素亮直之臣發論匡正無避忌諱孰能繼之辯想蘇秦有患侵德經云大辯若訥蘇秦六國遊說之士興智巧尚浮僞後至齊國遇刺客而殞徒愛佩六國印且不懼一朝禍矜辯任智可不畏乎白玉潔身如玷缺德經注云學行大成常如玷缺也清江同志昧深沉德經注云沖虚其懷乃持滿之道滿而不溢則長守富貴用不窮矣唐虞退讓英風遠信史編芳好重尋德經注云人君政化大成而更謙虚退讓若有虧缺日新其德用之不弊矣天下有道章第四十六梁冀無才恃禁闈不能知足贊成規德經云禍莫大於不知足今以梁冀爲諭且無才恃寵可謂不知足矣方當炎漢顛危日獨盛朱門跋扈時後漢桓帝之時國祚凌夷人方澆薄梁冀處貴極之位而不能匡君以忠律己以儉乃更一門驕貴成跋扈之臣福過灾生成滅身之禍悲夫孫壽正迷矜綺繡孫壽梁冀之妻迷蕩正性躭惑美容張綱徒耻問狐狸漢發八使以探天下風俗張綱埋輪不發云豺狼當路安問狐狸遂奏梁冀之罪禍盈覆餗殲三族事污青編萬古悲桓帝以梁冀奢僣罪深遂令單超等圍其宅誅之不岀户章第四十七不勞窺牖見天道德經云不窺牖見天道也内鑒身明象外心德經注云聖人不出户知天下者以己身知人以己家知人家秦漢戰爭矜妙略唐虞清靜朗宸襟德經注云人君清靜天氣自正多欲則煩濁九疇書出波瀾闢萬歲聲高洞壑深人君若能法道清靜必至河出九疇山呼萬歲六國澆醨徒歃血漫爲盟誓互相侵嗟乎六國之王不尚清靜之化但弘機智之風徒成歃血之盟互有相侵之志也爲學日益章第四十八負笈尋師貴藝成詞鋒將淬敵青萍格高自禀江山秀才贍何關筆硯靈莫見愛吟矜白雪豈知躭學聚飛螢若能日損無清欲方悟有爲勞我形德經云爲學日益爲道日損又注云爲學者日益見聞爲道者日損功行益見聞爲修學之漸損功行爲悟道之門故因益積功功忘而體道可不休哉聖人無常心章第四十九聖人出震無常心德經云聖人無常心以百姓心爲心也應物推恩煦嫗深德經注云聖人之心物感而應應在於感故無常心存撫嬰孩分帝德德經注云聖人念彼蒼生猶如慈母故凡視百姓皆如嬰孩指明善信顯君臨德經注云欲善信者吾因善信之不善信者吾亦善信教之令百姓感吾德而善信喜聞藥石還宗道惡見笙竽恐嗜音德經注云聖人廣大包荒納污法道象天自行善信皆感德潜化暗合無爲之功人君若納諫去惑自成善信萬國悅隨歸洞鑒靜如明月朗宸襟德經注云百姓皆注耳目又注云緬被百姓化聖德爲善故傾耳目觀聖人也岀生入死章第五十達識迷根共一途德經注云了悟則出生執迷則入死也若論清濁理還殊積功累德沖青漢溺俗貪名歎白鬚能想蓬瀛分了悟不嫌情欲認凡愚緱山略住雲頭處應笑紅塵蔽九衢王子晋得道緱山乘彼白雲舉袂謝時人而去道生之章第五十一萬類皆因道始生德經注云道始生者一也一生陰與陽陰陽生萬類是知衆類非道不生也聖人弘德法圓清德經注云天之於萬物也生則不有爲則不恃長則不宰任其自然是謂天之德也亦同人君治世矣無爲闡化寰區靜德經云道德本無爲豈有情於尊貴但萬物自當尊貴之是明自然之爵命不宰推功日月明德經云長而不宰雨露恩深蘇草木絲綸言出福黎甿德經注云道之於萬物非但生畜之而已乃復長育成熟養之覆之全其性命人君若能法此治國治身當符道尊德貴之位亦同天然爵命而自歸之直縁被物皇風遠四海傾心自太平德經注云道德之尊非假爵命但生成之功被物而常自然貴爾天下有始章第五十二密用修行挫六根德經注云不縱六根自無禍患竟無危殆保終身德經注云若開張六根矜其視聽以濟其愛悅之事則常有禍患故終身不救若挫其六根則終身必無危殆之事能嫌口爽熊蹯美須怯心迷鳳髻新德經注云口在人身爲患最大是非生焉滋味攻焉又云眼耳鼻之門若不爲嗜欲所牽則終身無勤勞之患熊蹯味之珍者所宜戒之鍊氣永應塵不染德經注云常守沖和妙氣不令離散則修治其身長無危殆之事守柔長與道相親德經云守柔曰强問他温樹無言對漢孔光處之崇貴有人問温室前樹終無言答之蓋愼密不洩禁中事方見韜光吉善人德經注云愼言節食鍊氣韜光使我介然章第五十三須信无爲道甚夷莫由邪徑失宏規德經云道甚夷而人奸徑注云夷平也徑邪道也言非無爲之道不平而自入有爲之邪徑夫小徑險而難大道安而易也閑思峻宇雕墻事爭似卑宫菲食時德經注云崇其宫殿飾其廊宇則百工並作田畝焉得不荒田既蕪倉廪焉得不虚也文德若修揺木鐸武功還偃卧征旗德經注云文德不修尚武備即全失無爲之化如能治國常居大似日高明照海涯德經注云聖人之道其明如日不在天則無以照六合聖人不居大則無以濟天下善建者不拔草第五十四鴻基不拔同天在德經注云善以道德立身立國不可引而拔之匪輟蒸嘗社稷延德經云子孫祭祀不輟蓋社稷延洪不絶君信臣忠豐至德德經注云修道於國則君信臣忠仁義自生重尊矜幼顯通賢德經注云修道於鄉尊重長老愛養幼少教誨愚鄙其德最長爲不可及也水還滄海垂衣日琴引薰風煦物年德經注云修道之國觀不修道之國故可以唐虞之德鑒桀紂之罪必能致理康時也法道無爲臨大寳碧空長有壽星懸若能法道清靜以臨大寳必有壽星之瑞含德之厚章第五十五含德全眞同赤子德經注云至人含懷道德之厚者其行比於赤子也始教三毒潰淳和德經云毒蟲不螫猛獸不據攫鳥不搏注云含德淳厚之人萬慮不干於心神可以比赤子者淳和全於外至德懷於内以毒蟲喻嗔猛獸喻癡攫鳥喻貪絶此三毒故不爲其所傷張良絶粒遺軒冕許邁修身隱薜蘿漢張良絶粒從赤松子遊晋許邁修道周遊山水之勝境不遠萬里了悟眞常宗道少縈貪爵禄益生多德經注云人能知和氣柔弱有益於人則爲深知道德眞常之用又云衆人以爭競爵禄榮達日增不知守常而求道益生過分動之死地莫矜物壯强梁志衰老相隨事若何德經注云物壯極則衰老故戒之矜壯恃强之人是謂不合於道也知者不言章第五十六知者不言縁了悟碧鷄强辯豈能知德經注云道無形象蓋非言說所及唯證悟者知之親疏匪得垂雲鶴德經注云玄同無私故不可得而親又注云泛然和衆故不可得而疏利害難侵曵尾龜德經云不可得而利不可得而害也箕岫堅辭神器處桐江還應客星時德經注云體道自然故不可得而貴許由隱於箕山堯讓天下於由堅辭不受嚴陵與漢光武有舊素不樂客星之貴却還釣渚之時蓋不可得而貴銷除愛染清襟素德經注云既無愛染則嗜欲之門閉矣道德尊高出世姿德經注云既不可得親疏又不可得利害不可得貴不可得賤是爲天下貴道德自更尊高也以政理國章第五十七垂衣治國固无事德經云以無事取天下哲后忘清化自清德經注云聖人之道嗜欲不干於心則奢溢綺靡之物安所用之以此化人自朴淳矣去盜不因刑網密德經云法令滋章盜賊多有也安時須是賦輿輕德經云天下多忌諱而民彌貧注云謂禁令多端山澤所資有無皆禁止之悉加繁稅而焉得不至彌貧也淳如堯酒皇風遠德經注云政教无爲寬大則民應之淳朴也靜似吴江素月明德經云我好靜而民自正何必使民成缺缺萬機寬大慰蒼生德經云其政察察其民缺缺又注云若政寬大則人淳然朴素也其政悶悶章第五十八禍福同途分倚伏德經云禍兮福之所倚福兮禍之所伏也聖人明德内含光德經云光而不耀又注云聖人雖有獨見之明常自晦昩不以耀亂於人山棲一旅翻强盛臺築九層俄敗亡越王爲吴王所敗勢窮以餘兵棲於會稽山用范蠡計釋越而還吴王既勝越築九層之臺悦西施之貌沉伍員之屍會趙鞅之盟仁德不修尋爲越報仇一旦敗亡俄成丘墟也謫去長沙甘退跡漢賈誼文帝叙用爲絳灌所不容出爲長沙王傅詔歸宣室出殊鄉後文帝徵誼於長沙對於宣室因尋𪀢賦深微理天地爲鑪不可量賈誼初謫長沙之時以失志之際湘中地多卑濕方有疑懼而有𪀢集舍𪀢乃南中怪鳥人皆深忌誼以勢窮道塞遂製𪀢賦定以生死之分達於窮通之理賦中有天地爲鑪之句蓋欲明委心於天莫測倚伏之理後果岀殊邦却還丹闕也治人事天章第五十九治世莫如宗嗇愛德經云治人事天莫若嗇注云嗇愛也人君將欲治人事天莫若愛費使倉廪實人知禮節三時不害則天降之嘉祥德弘卑服保皇居德經注云聖主賢臣常以卑服悉從嗇愛之道也惜狐裘處身无玷德經注云晏子狐裘三十年此明賢臣嗇愛之道罷露臺時儉有餘漢文帝儉德聞築露臺帝曰可比十家之産尋令罷之損己敷恩人景附德經注云聖人損己有餘以奉人之不足也窮奢黜武國空虚漢武帝恃四海一家兵力强富遂窮軍勢於雲中繼訪神仙於海上帑藏空虚生民疲瘵也深根固蒂長生理德經注云嗇愛克己之行以成治人事天之德帝王流而行之非惟深根固蒂以有其國亦乃長生乆視乘彼白雲至于帝鄉黄帝其人也不假文成自獻書漢武之時有李少翁自上書言有神仙之術遂拜文成將軍後以飰書於牛腹詐令剖出驗其僞跡因乃誅之矣治大國章第六十道蒞寰區絶妄求鬼神無害服皇猷德經注云以道蒞天下不求無妄之福故鬼无以見其神明秦矜虎視隳三輔禹鑿龍門護九州德經注云周書曰至治馨香感于神明黍稷非馨明德惟馨所謂聖人至治之德莫急於拯救生靈明德之馨香感動神明天地非惟富壽不極抑亦景祚無疆秦虎視關東不修文德終爲劉項所滅禹鑿龍門導百川歸海活九州生民可謂契拯救之旨月助鳴琴調永夜雨籠圓沼湛高秋德經注云此章立意當以至治靜正爲宗今以琴諭守正秋諭澄靜取事證理化成兩不相傷後自有卿雲瑞氣浮德經云非其神不傷民聖人亦不傷民也大國者下流章第六十一東溟善下百川歸德經注云大海卑下百川自歸大國謙下萬邦自附柔靜心持出世機德經注云人君守於柔靜則天下交歡而歸之大國謙卑昌帝道諸侯傾矚向皇闈德經云大國執謙德而下小國者不過兼畜小國爲臣妾小國取大國爲勢援也晋文報楚終成霸鄭忽辭齊自失機晋文公未入國嘗遊於楚楚禮之楚王問文公他日將何報不穀文公曰若遇楚師請避三舍後歸國遇楚師不失其信終爲盟主鄭太子忽有功於齊齊欲妻之忽辭以小國不侔大國拒而不受後爲蔡仲所逐無諸侯之援蓋失機也无怠無荒弘至德納隍心不忘宵衣德經注云大國者常戒滿盈道者萬物之奥章第六十二能依玄域窮深奥須認襟虚己出塵德經云道者萬物之奥也弘有道心分達士佐無爲主是賢臣德經注云若非至道大善之人豈能重寳深奥救人之志也又經云故立天子置三公共教不善之人也要均救物甘言教曲誘迷根不善人德經注云聖人以甘美法味之言尊高清靜之行以化不善之人罪累永銷潜體悟玉京丹鶴自相親德經注云道在於悟不在於求既悟則自无罪累必契沖虚也爲无爲章第六十三至人因事自塵機德經注云衆人因事以生事道者因事以息事道味无貪靜所思德經注云道之味非俗間滋味且道之味尚不可貪何况俗間之味但固謙心敦信諾德經云輕諾必寡信也未嘗閑恨記瑕疵德經云大小劣少報怨以德也要蘇萬彙調風處永格三苗舞羽時德經注云聖人製作有爲而使無爲有虞雖調薫風舞干羽因有爲成無爲之化也負扆凝旒弘大化穆王何必會瑶池虞舜凝旒自臻至道何必周穆王會於瑶池車輪馬跡將周四海徒有虚妄之求且非清靜也其安易持章第六十四安靜修身易守持德經注云治身治國安靜者易守持始分清欲要崩隳德經注云情欲禍患未有形兆之時則易謀止也木成干霧萌芽處臺築參雲覆簣時德經云合抱之木生於毫末又云九層之臺起於累土趙主不能輕國寳董生須至重文辭德經云不貴難得之貨又注云衆人乃學俗學所謂攻乎異端聖人法道无爲故學於不學豈非備復衆人異端之所過患歟趙王令藺相如送璧於秦求其連城之價是貴於難得之貨昩於道㫖安可使董仲舒不下帷讀書以求世利斷可知矣慎終如始還無敗愛惜精神忌有爲德經云愼終如始則無敗事又注云有爲於欲廢於精神古之善爲道章第六十五善誘時人盡守愚總銷情欲似枯株德經注云古之善爲道者非以明民將以愚之不環智水隳三惑唯蕩眞風靜四隅德經注云上人賢君善以无爲之道化人常任質朴愚古之士不使功智黠慧之徒惑人眞性又經云民之難治以多智負扆有心宗大道凝旒無事闡丕圖軒皇治國能如此功就乘雲出鼎湖德經云不以智治國國之福軒皇宗道無事濟治四隅後於鼎湖乘彼白雲至于帝鄉江海爲百谷王章第六十六江海尊爲百谷王下流無逆水茫茫征帆乍展揺風勢杲日初昇蘸曉光槎犯星辰仙浪闊路通吴越碧波揚人君能法謙卑德萬國樂推興運長德經云江海所以能爲百谷王者以其善下之故能爲百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推無猒以其不爭故天下莫能與之爭天下皆謂章第六十七非智非愚如不肖德經云天下皆謂我道大似不肖注云不似於智不似愚與物不同故言不肖也常持三寳蕩眞風德經云我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先也儉成濟物無多費慈救群生有大功已在上注中仁德既均中土洽道清還與上玄同德經注云夫慈仁者百姓親附又注云人君能行此三寳則天地神祇固合爲助護也强秦捨此平區字纔築興基一旦空德經云今捨其慈且勇捨其儉且廣捨其後且先死矣秦始皇捨三寳任智力社稷不延永悲夫善爲士者章第六十八弘道何嘗恃武威德經注云貴其道德不尚武力但用虚柔化物不以剛武伏人也非因忿怒展征旗德經云善戰者不怒羽干演化終無戰帷幄用賢方出師德經云善勝敵者不爭善用人者爲之下虞舜舞干羽於兩階三苗自格周武尊太公於帷幄全師始行項籍不虞奔去夜項籍兵敗垓下聞楚聲四合知楚兵悉爲漢有遂别美人於帳中夜遁而去當恃强肆志之時豈知奔敗之夜乎悲夫符堅寧慮却來時符堅以百萬之衆伐東晋拒王猛之諫忘水影之灾及淝水之敗却來之時聞風聲鶴唳以爲晋軍至矣寧不愼歟須知軍旅難輕舉四善還能靜九夷德經云善爲士者不武善爲戰者不怒善勝敵者不爭善用人者爲之下用兵有言章第六十九爲客持謙常守退德經云吾不敢爲主而爲客不敢進寸而退尺也攘能無臂慎兵符德經注云攘臂所以表怒善戰不怒故無臂仁慈興慮是全策輕侮萌心失遠圖德經注云以慈爲主又注云禍莫大於輕侮敵人空仗貔貅凌越國豈知麇鹿走姑蘇吴王自恃兵强憑凌越國不思勢窮國破姑蘇臺側麇鹿空遊莫教喪寳違深理德經云侮敵幾喪吾寳應物行機靜四隅德經注云彼曲主兵而攻之直不先執兵以應之雖則執持其兵本無害物之意吾言甚易知章第七十上聖玄言理甚明德經云吾言甚易知甚易行不能知又不能行德經云天下莫能知莫能行者目盲傾國綺羅色耳聵迷人鄭衛聲躁欲未銷形易濁寵榮如縛志難清德經注云惑於躁欲故莫能知也迷於榮利故莫能行也被褐懷玉沉潜者内鑒眞常徇世情德經注云被褐者昩其外懷玉者明其内故知我者希也知不知上章第七十一知似不知分上德德經注云道者内知於道外若不知乃德之上也不知知者病虚言德經注云不知道而妄言知乃是妄言之病也衆人雖昧眞常境諸聖恒開利濟門守得恬和全浩氣憫方貪欲指迷根隨機救拔群生意還比高天廣覆恩德經注云聖人無此强知之病者以其常憫衆生皆有此病是以自不能病也人不畏威章第七十二人不畏威成憲網德經云人不畏威即大威至使心虚白即神居德經注云神所居者心也除情去欲使虚而生白是非自見身無咎德經注云聖人自知己之是非於内不見其德美於外也精氣常全道有餘德經注云自愛身中精神和氣安寢既翻莊叟蝶忘情還樂惠施魚德經注云自知其身防可畏之事自愛其身無猒神之咎夫如是則莊蝶惠魚遂出塵之樂能嫌驕貴韜藏者三逕雪深關弊廬德經注云不自驕貴榮名於世袁安遇雪閉户高卧不干於人勇於敢章第七十三勇於敢殺逆神明德經注云勇於果敢有所作爲者豈同自殺其身何也夫不仁之人不懼神理應報之禍始能賈勇果敢以殺於物既殺必報故知當同自殺其身明矣常抑剛强是保身德經云勇於不敢則活畏害若能心去惑德經注云敢與不敢自活其身爲利自害其身爲害不言還有善來親德經云不言而善應世情尚惜持謙士天網寧矜用壯人德經注云天之網羅雖恢恢疏遠刑淫福善毫分不失看取烏江臨岸處拔山威力謝埃塵項籍有拔山之勢盡刎頸於烏江人常不畏章第七十四恩深祝網獨殷湯好殺終難定紀綱德經云人常不畏死奈何以死懼注云縱於情欲動之死地習以爲常嘗無畏者人君當以清靜化之奈何更立刑法以誅殺常恐懼也文帝惡刑循五聽漢文帝之時以黄老治國幾至刑措可謂循於五聽高皇寬法約三章漢高祖先入關與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法諸吏民皆安堵順天治物人從化德經注云若人君導以寡欲靜以無爲則人懷其生咸皆畏死代匠掄材手自傷德經注云人君代天理物若行刑罪不中亦猶拙夫代匠斲木豈唯方圓不得其法希有不傷其手矣可不慎之鑄鼎成功分道德攀龍髯去白雲鄉軒皇治世弘濟活之心非惟四方清靜從化抑以鼎成功就天垂龍髯乘彼白雲至于帝鄉民之饑章第七十五人君奢侈即民饑德經注云天下之人所以饑乏不足以其君上食用賦之太多難治還縁政有爲德經云人之難治以其上之有爲是以難治也居位厚生求富盛窮途輕死轉疲羸德經注云居位者不能抑損有爲因之損下益上百姓窮竭無以供輸既不重生使成輕死逼身爵禄無心後德經注云夫獨無以生爲務者爵禄不在意財利不入心任運虚懷滿院蓬蒿養性時德經注云雖貧賤不可以利害生張仲蔚所居蓬蒿滿院直到垂衣分至化自然難拔太平基若人君垂衣闡化烝民自足必固太平之基矣人之生章第七十六草木敷榮展厚陰德經云萬物草木生也柔脆和氣存因知枯槁雪霜侵德經云其死也枯槁和氣去直如合抱藏幽澗却被纖枝出衆林德經注云根本强盛故處於下枝條柔弱故生於上蓋取其柔弱在上强梁在下柔弱全生堪用意强梁失性可驚心德經注云生之柔弱和氣全死之堅强和氣散欲明守柔弱者全生保年爲强梁者亡身失性也符堅輕敵亡師旅淝水不流冤氣深符堅恃富盛之勢恣强梁之性敗於淝水淝水爲之不流終喪其身天之道章第七十七須知天道諭張弓德經云天之道其猶張弓乎舉下抑高分至公德經云高者抑之下者舉之也自損有餘嫌屋潤常嗟不足見途窮德經云損有餘而補不足雖恢皇業猶藏德德經注云聖人不欲天下知己之賢是匿其功德之名畏夭之道以損有餘廣福蒼生匪恃功德經云功成而不處涿鹿罷兵眞氣在便迴鑾輅訪崆峒黄帝罷戰涿鹿訪道崆峒見廣成子也天下柔弱章第七十八方圓似水分柔弱德經云柔弱莫過於水也能勝剛强理甚明德經云柔勝剛受垢推恩同渤澥責躬成化服寰瀛德經注云人君若能象水之德納污受垢無所忌諱置誹謗之木敢諫之鼓是謂社稷明主得道賢君也縱知深㫖誰宗信各蔽常情孰肯行德經注云柔弱之道勝於剛强天下之人莫不知者知有此道而不能行干木德風難繼踵杜門高卧息秦兵叚干木居魏高卧秦不敢加兵於魏也和大怨章第七十九天道無親福善人德經云天道無親常與善人也若持左契即全眞德經云是以聖人執左契而不責於人既無公正徒施惠不慮仇讎欲害身德經注云居位者不能持執契信致令過有所生且奢侈在己常儉於人邪枉在内求正於外患禍生我要福於天過不責躬施刑於物是與人子居而殺其父與人兄居而戮其弟方欲厚與玉帛廣酬爵位擬求解釋其可得乎忍見陳君忘大寳信知江總匪忠臣後庭基跡分明在玉樹翻生野草春陳後主不能執信臨人唯恣奢侈植後庭玉樹爲天下勝遊江總乃最奉恩榮不能匡救復於三閣以預狎客飛牋走筆搜物象於八紘鐵瓮金甌恃堅牢於一水殊不知隋君演德陳主迷心俄至敗亡爲千古悲歎豈非江總負於平昔恩寵悲夫小國寡民章第八十舟車雖有未嘗乘德經云雖有舟車無所乘之顔子簞瓢道德弘德經注云道在身雖顔子簞瓢適足爲甘也喜見生民歸壽域德經注云寰宇廓清之朝致蒼生於仁壽之域也笑將兵甲護金陵德經云雖有甲兵無所陳之江南六朝皆都金陵但將兵甲以固江濱且非蕩蕩巍巍之德無心固是安殊俗德經注云道在身雖子欲居九夷亦足爲樂也返朴終還用結繩德經注云國政還淳人皆返朴結繩而用之固合無爲知有永嘉懷愍禍不詢良策向何曾西晋武帝初以勤儉之德平定寰區滅蜀之後唯餘吴國允羊祜張華杜預之策尋滅於吴六合既清萬邦傾向固可弘清靜之化復淳朴之風而乃惑孫皓之美人愛惠帝之弱質迷於目前不思遠大何曾謂其子曰吾荷國重恩常思獻替每見帝不詢經久遠圖但說平生常語指其孫曰汝後必罹其禍及永嘉之際劉聰劉曜爲逆併陷懷愍二帝悲夫信言不美章第八十一莫愛美言終不信信言不美益人多德經云信言不美美言不信善心匿耀眞修習辯口矜能詐唯阿德經云善者不辯辯者不善唯阿者謟徇之辭朴質忘機齊抱瓮縱横違性薄懸河抱瓮無機勝懸河有辯聖人利濟民歸德德經云聖人之道爲而不爭玉燭須調物象和德經篇章玄頌卷下
