body:
  text: 道可道章第一莫將常道同眞道難把常名污大名道經云道可道非常道名可名非常名無欲始能全皓素有爲終是悮聰明道經注云人常能無欲則可以觀道之要要謂一心心源直要澄虚靜情地偏宜耨坦平但且勤行須洞曉未分清濁已萌生道經云無名天地之始始者道本也天下皆知章第二增修德者遺榮貴却與伊姜盛業同爲善匪矜分至善成功不伐是殊功道經注云不敢寧居而增修德者忘功而功存不居而不去若能養素三丹靜直到無言萬事通道經云行不言之教名立身全堪羡處扁舟難滯五湖風道經云夫唯成功不居其位范蠡功成名遂遁跡五湖不尚賢章第三爲革浮華不尚賢道經云不尚賢却將金玉委山泉道經注云人主不御好珍奇黄金棄於山珠玉棄於泉功名不伐歸淳素嗜慾皆銷合自然道經注云不爭功名返自然又云除嗜慾去煩亂吉士既能宗澹泊佳人難更衒嬋娟道經注云放鄭聲遠佞人虚心實腹勤修習道經云虚其心實其腹得到無爲是洞天道沖章第四韜藏名譽貴全身不把閑愁撓正眞道經注云道匿名藏譽其用在中也爲吏漆園明挫鋭守關函谷是同塵道經云挫其鋭又云同其塵莊子爲漆園吏尹眞人爲函谷關令湛然混俗如澄水邈矣延齡出大椿先象帝生保安靜恰同琪樹鎮長春道經云吾不知其誰之子象帝之先又注云道至今在者以能安靜湛然不煩勞欲使人修身法道也天地不仁章第五天地垂恩均萬物目爲蒭狗似無恩道經注云天地生萬物人最貴天地視之如蒭草狗畜不責望其報也空虚不滯生成在情欲俱忘皓素存道經注云天地之間空虚弘氣流行故萬物自生人能除情欲節滋味清五藏即神明居之愛氣養精宜守德保身銷患誡多言道經云多言數窮不如守中又注云不如守德於中育養精神愛氣希言也因思玄默深微理須覓修心靜者論谷神章第六圓清厚載窮根本玄牝門爲不死鄉道經注云不死之鄉道在於玄牝玄天也於人爲鼻牝地也於人爲口也猛出囂塵無得喪靜調眞氣覺舒張六情銷處如冰釋五性圓時助橘芳道經注云五性其鬼曰魂六情其鬼曰魄若去六情而清五性即了玄牝之門煙蘿子云大如彈丸黄如橘出彼玉池入金室者也應用若存功行畢自分岐路見虚皇道經注云虚牝之用綿綿微妙應用若存其用無心故不勤勞也天長地久章第七天地綿長理甚微自除矜伐是玄機道經注云天地生物德用甚多而能長久者以其資禀於道不自矜其生成之功也外身却得遐齡固後己翻成衆善歸道經注云先人而後己又云外身則心忘澹泊故身存蠖屈沉泥韜遠勢玉藏深岫祕通輝若能宗尚無私化莫遣行心與道違道經注云聖人無私而己自厚故能成其私也上善若水章第八上善無如水性柔道經云上善若水難將夷嶮礙清流偶穿積靄離幽壑豈爲垂楊向御溝利濟既能均萬物環迴終不滯孤舟道經云水善利萬物方圓用智修行處全勝秦皇駕海求道經注云於事善能因任亦如水之性方圓隨器不滯於物持而盈之章第九虚白爲心最忌盈莫因高貴變常情道經注云盈滿也已止也持滿必傾不如止也又經云富貴而驕自遺其咎耳孫弘延納全身禄吴芮兢持後嗣榮公孫弘開閤延賔敦尚謙遜終得富貴長沙王吴芮因梅鋗有功而受封故兢持榮禄相傳子孫也秪見乘軒索萬慮寧知欹桃夢三清范蠡張良雖乘軒冕豈忘於道泛湖絶粒皆能退無玷奇功顯盛名范蠡泛湖張良絶粒載營魄章第十抱一歸身莫暫離道經云抱一能無離乎愛民興國要無爲道經注云愛養萬人臨治國政能無爲乎當自化矣三魂安靜還增壽四達分明却不知道經注云魂靜道氣不亂魂安得壽延年又經云明白四達能無知乎專守精神全浩氣若生分别失嬰兒道經注云專一沖氣使致柔和能如嬰兒無兩分别之也功成不宰彰玄德始是孫謀萬代基道經注云道長養萬物長大不宰割以爲器用又云既不爲主宰人君能如此者謂深玄之德也三十輻章第十一空虚一轂同玄理三十輻凑功用深道經注云古者車三十輻法月數也共一轂者轂有孔衆輻凑之治身者當除情去欲使五藏空虚神乃歸之治國者貴能總衆共扶强也明證其理埏埴顯就器能受户牖俱明道可尋道經注云埏埴者和土爲飲食之器又云器中空虚故得有所受盛又云户牖空虚人得以觀出入並比沖用之方不染是非潜養素暗嗟貪欲靜調琴一心無用衆心服始是逍遥出世心道經注云虚無制有形五色章第十二如能賤目六情銷爲腹常應氣馬調道經云是以聖人爲腹不爲目爲腹則去六情賤目則無妄視也口爽直縁躭玉膳道經云五味令人口爽爽妄也嗜於五味則口妄言失於道心狂還似騁金鑣道經云馳騁田獵令人心發狂又云馳騁世務躭著有爲如彼田獵唯求煞獲自以心闘逐境奔馳靜而思之是發狂病出塵好繼聞天鶴溺俗須驚截道飈捨欲全眞宗澹泊不居巖谷自逍遥寵辱若驚章第十三老君垂誡甚分明寵辱來時盡可驚道經云寵辱若驚無玷何妨居下位有勳須更讓殊榮干湯負鼎匡明主遁越扁舟惜令名伊尹負鼎干湯蓋弘利濟范蠡扁舟遁越永保功名能猒世塵弘利濟功成身退保前程視之不貝章第十四希夷微竟同爲一道經云希夷微此三者混而爲一也運動繩繩不可名休把玄黄憑有色莫將音律比無聲道經注云繩繩者動行無窮極不可名者非一色也不可以青黄赤白黑别之非一聲也不可以宫商角徵羽聽之非一形也不可以長短大小度之除情去欲眞風集執古同今至化清道經注云執古無爲之道以御今有爲之事則還返淳朴弘道不曾分曒昧周通上下自光眀道經云其上不皦其下不昩又注云在上者必明在下者必昩唯道於上非上在上亦不明於下非下在下亦不昩古之善爲士者章第十五古之善士守玄通道經注云玄天也言其志節玄妙能與天通道德弘深不可窮道經云道德深遠不可識知内視若盲返聽若聾能知其長豫若川行眞性在道經云豫若冬涉川又注云豫閑豫也善士於代間法如涉冬川衆人貪著故畏懼今我不染故閑豫也涣然冰釋俗塵空道經云涣若冰將釋又注云涣者解散釋者消亡除情去欲日似空虚有若春冰之將釋徐清既得無人識道經注云水濁則止而靜之徐徐乃自清比濁還能與衆同道經注云渾者守本眞濁者不照鑒也與衆合同不自尊保志不盈祛執滯守其弊薄暗成功道經注云保此徐徐生長之道不欲奢大盈滿又云當須無所執滯若執清求生是謂盈滿將失此道又云夫唯不盈滿之人能守其弊不爲新成能弊者匿光榮新成者貴功名致虚極章第十六能清襟素臻虚極道經注云得道之人損情去欲五内清靜至此虚極靜篤弘持出世塵道經注云守清靜行厚篤萬物更生明指諭一身甘老自因循道經注云萬物無不枯各復返其根而更生也心如空谷含容廣道經注云知守眞常則心境虚靜如彼空谷無不含容也德合中天覆載均道經注云德與天通則與道合同也道乃久長延福祚道經注云與道合同乃能長久永无危殆顯修眞道經注云同天行道則終殁其身長无危殆之事也太上章第十七治化須同太古時照臨如日朗无私道經注云太上謂大古无名號之君下知有之者下知上有君而不見事朴淳功成事遂世方靜鑿井耕田人不知道經注云功成而不執事遂而無爲百姓日用而不知謂我自然而成遂則太上下不知也遠體朴淳恢正道察常畏侮保宏規道經注云德又下衰君多弊政人不堪命則驅以刑罰畏之懷情相欺明不能察故侮之若能君信長均足豈到臣寮有面欺道經云信不足有不信又注云君之信不足故令下有不信之人大道廢章第十八不宗大道分仁義道經云大道廢有仁義縁失家肥别孝慈道經云六親不和有孝慈馭索未能忘有作人君治政如朽索馭六馬結繩方得合無爲上古用結繩之政才高八斗時情僞道經云智慧出有大僞忠殉三良國祚衰道經云國家昏亂有忠臣秦穆公以三良殉葬也直到衆星皆斂耀日華還普照天涯道經注云大道之時仁義没孝慈滅猶日盛明衆星失光絶聖棄智章第十九聖智俱捐浩氣清道經云絶聖棄智修身何處用聰眀守玄出俗師莊叟莊子逍遥任性絶聖棄智全眞法道著南華眞經行於世背道矜文笑禰衡禰衡字正平自恃才謀常多踞傲曵尾汎龜終遂性不才山木保長生塗中靈龜曵尾全性山木發地不才保生少私寡欲還淳素道經云少私寡欲秪向丹臺是玉京丹臺心也苟積功行玉京蓬山自心而見矣絶學無憂章第二十若能絶學即無憂道經云絶學無憂善惡萌心亦自由道經云善之與惡相去何若以諭俗絶學即無憂不絶則生患察察興謀何日靜道經云俗人察察立其法制熙熙多欲幾時休道經云衆人熙熙熙熙淫樂多情欲也情田靜默尋常樂道經注云容貌忽然若昏昩而心寂兮絶於俗學智水環迴分外愁道經云俗人昭昭矜巧智明示鄙頑潜了悟道經云而我獨頑似鄙又云頑者無分别鄙者陋不足而心實了悟外若不足却勝駕海訪瀛洲秦皇欲駕海求瀛洲却涉虚妄豈能入道也孔德之容章第二十一垢濁能容是至人卑謙和衆内修眞道經注云有大德之人無所不容能受垢濁處卑謙也雖開青眼向時態潜固丹心岀世塵道經注云大德之人不隨時俗所從於道也恍惚無形成物象道經注云道唯恍惚無形其中獨爲萬物作法象窈冥難狀寳精神道經注云道唯窈冥無形其中有精實神眀相居陰陽交會須知至道休天在如秀莊椿碧洞春道經注云從古至今道常在不去曲則全章第二十二曲己修身即自全道經注云曲己從衆不自專則全財多成惑誡通賢道經注云財多者惑於守身機深始借張良筯功就終揺范蠡船道經云不自伐故有功能絶是非寧衒美道經注云聖人不自以爲是而非人故能彰顯於世矣不辭窪枉豈爭先道經注云枉己以伸人又云地窪下水流之人謙下德歸之如宗弊薄修陰德瓊樹瑶臺在眼前道經注云人能長守弊薄不自矜衒則人推其長夫如是則瓊樹瑶臺之遊自心而去矣非假外求也希言自然章第二十三若解希言道德同道經注云希言者忘言也不云忘言而云希者明自言以詮道不可都忘悟道則言忘故云希爾若能因言悟道不滯於言則合自然矣深嗟失者昧玄功道經云失者同於失謂任己失人縈纏世網猿縻鏁了悟天機鶴出籠道經注云執言滯教無由了悟又注云體道者悟道忘言即同於道竟夕未聞延暴雨終朝長不盛飄風道經云飄風不終朝驟雨不終日蓋言暴不能久能嫌用壯持安靜心比無雲月在空道經注云人爲事當如道安靜亦不當如飄風疾雨也跂者不立章第二十四自賞光容露俊才秪知揚己運梯媒道經注云人自見於形容以爲好自見所行爲應道殊不自知形之醜操行鄙露才揚己動而見尤故不明也如能昧跡見眞性若惡貪名遠禍胎道經注云貪權慕名進趍功榮則不可久立身行道也須怯是非成怨府道經注云是己非人乃爲怨府堪防矜伐清靈臺道經云自矜者不長靈臺心也莫教害物人還畏免到巢由去不迴道經注云若自是自矜之人在位動欲傷害故物無有不畏惡之乃有道之人不居其國有物混成章第二十五蓬瀛難去海濤深徐福狂疏妄擬尋四大須知恢世法道經云道大天大地大王亦大蓋法地則天三天非遠繫人心道經注云妙用無方强名不得故自大而求之則逝而往矣自往而求之則遠不及矣若能了悟則返在於身心而證之秦皇用壯空尋藥漢武勞神枉鍊金要識眞源安靜理拂衣高謝入煙岑道經注云人當法地安靜和柔要窮安靜之理非絶俗遁跡之人莫能參預重爲輕根章第二十六道同輜重莫離身持躁明知靜是君道經注云輜車也重者兩載之物也輕躁者貴重靜亦由行者之守輜重故失輜重則遭凍餒好輕躁者則生禍亂道經云靜爲躁君多欲衆人愁似織少私高士跡如雲漢文儉素延宗社殷紂荒淫污典墳道經注云宫闕妃后所居超然遠避而不處漢文帝儉素慎夫人衣不曵地殷紂惑妲己之容恣於淫蕩須到無心齊萬物不驚江上白鷗群無心於物物自歸之古有人入島無機鷗不驚去及有心取鷗鷗飛不下善行章第二十七了悟玄機不下堂須知心是白雲鄉道經注云善行道者不下堂不出門於諸法中體了眞性燒金鍊藥世皆惑涉水登山人自忙不下堂可了玄機堪嗟昩理之人烹鍊五石周流四海何契於道五善若能韜密用三天必得見虚皇道經云善行者無轍跡善言者無瑕讁善計者不用籌筭善閉者無關鍵善結者無繩約是謂五善也枉教漢武勞宸扆風入茂陵揺夕陽漢武帝雖有慕仙之志且無出俗之心費寳玉以妄求想蓬瀛而不到豈知心若了悟不假外尋竟爲李少翁欒大所惑終成虚妄茂陵則武帝所葬之陵也知其雄章第二十八知雄雖易守雌難道經云知其雄守其雌得似嬰兒浩氣安道經云復歸於嬰兒若悟昭明勞萬慮爭如暗昧靜三丹道經注云人自知昭明當復守之以暗昩而無所見不辭污濁潜丁鶴須怯光榮陟漢壇道經注云知己之有榮貴當復守之以污濁治國治身弘大制積功成日自驂鸞道經注云聖人用之則以大道制御天下無所傷割治身則以大道制御情欲不害精神將欲取天下章第二十九神器來歸去有爲道經注云欲以有爲治民也聖人因築太平基始能無執終難失道經云執者失之若惡恃强還不羸道經注云有所强大必有羸弱漢帝宫闈嫌綺繡漢文帝儉素慎夫人衣不曵地堯君堦砌惜茅茨登臨大寳何兢畏言出如綸萬國隨道經注云上所行下必隨之以道佐人主章第三十二八賢臣輔相時不窮兵勢惡危機道經云以道佐人主者不以兵强於天下也田疇先廢宜關慮道經云師之所處荆棘生焉農事廢田不修也勝負未知須慎徵道經注云勝負之數未可量也去伐無驕三令肅安民和衆四方歸道經注云善輔相者果於止敵蓋在安民和衆必不敢求勝取强雖果於止敵不爲寇愼勿矜功伐取以自驕盈驕則敗亡故爲深誡謀深止敵禆元首何必推功耀鐵衣夫佳兵者章第三十一用武爭如靜勝謨道經云夫佳兵者不祥之器陶唐明德握靈無義高隱逸淳風遠儉惜茅茨瑞氣敷堯讓天下於許由銷劍戟時恢帝道垂衣裳處闡皇圖望夷宫禍秦無祀空築長城匝海隅唐堯闡化弘清靜之風不佳兵以定四方唯垂衣而臨萬彙蒼生受福鴻業益昌堦不翦於茅茨器盡銷於劍戟萬古爲則豈不休哉秦始皇背道任智平一寰區忘不滿而禍胎萌生讖忽聞而長城遂築殊不知嗣傳胡亥政委趙高劉項起於山東章邯敗於河北趙高懼罪遂弑胡亥於望夷宫悲夫道常無名章第三十二朴小雖知孰敢臣道經云朴雖小天下不敢臣也侯王守一撫烝民道經注云侯王若能守一精道無爲而化則萬物將自賔伏德彰有道川歸海道經注云譬道之在天下與人相應和如川谷之與江海相流通政演無爲物自賔道經云侯王若能守之萬物將自賔澹蕩薰風分煦嫗涵濡甘露顯平均道經注云侯王若能抱守精一則天成地平交泰致和故乃致甘露之降蕭蘭俱澤不煩教令而自均平取譬侯王稱物平施薫風之化如何認得羲軒化日月貞明萬國春知人者智章第三十三能分善惡方爲智道經注云能知人好惡爲智自别賢愚始是明道經注云人能自知賢不肖是爲返聽無聲内視無形爲眀衒己勝人因勢盛除情去欲見心清道經注云能勝人者不過以威力又注云人能自勝除去情欲則天下無有與己爭者故爲强袁安知足貧勝富踈廣忘機退愈榮道經注云知足者富又注云人能强力行善則有志於道道亦有志於人也密用成功應不識休天長在福群生道經注云人能自節養不失其所受天之積氣則可以長久也大道汎兮章第三十四廣被生成均萬物道經注云萬物皆得道而生莫將繩墨世機同來歸造化不爲主道經云萬物歸之而不爲主也直到蕃昌匪恃功道經注云萬物恃頼沖用而生化而道不辭以爲勞功用備成不名己有匿德藏名忘滿大道經注云聖人法道匿德藏名不爲滿大檢身宗道致穹崇道經注云是以聖人法道忘功終不自爲光大故能成光大之業有虞演政調琴後草木咸蘇煦嫗風執大象章第三十五人歸至道比朝宗德契垂衣演大功道經云執大象天下往象外觀時非彩繪道經云視之不見又注云無形非若五色有青黄赤白黑可得見世間開處是絃桐道經云聽之不足聞又注云道非若五音有宫商角徵羽可得而聞潜將夢寐通三島不降恩榮向六宫國富民昌成寳祚用之無既蕩淳風道經注云用道治國則國富民昌治身則壽延長故無有盡時又注云以道鎭靜初無言教故視之不足見聽之不足聞而淳風大行萬物殺阜歲計有餘故用不可既將欲歙之章第三十六先極貪心要息心微明垂教理還深道經注云故將歙斂衆生情欲則先開張極其侈心令自困於愛欲則當歙然須知柔弱無人競直勝剛强有患侵道經云柔弱勝剛强名遂留侯能絶粒漢留侯絶粒從赤松子遊功成越相鑄黄金越相范蠡功成遁去後越王思之金鑄其形晨入朝之行權制物昌鴻業美溢青編萬古尋道經注云巽順可以行權行權則能制物道常無爲章第三十七道常無爲無不爲道經云道常無爲而無不爲也侯王師法衆心移道經注云萬物已化效於已復欲作巧僞者侯王將身鎮撫以道德也神州先廣朴淳後下國盡同清靜時道經注云侯王若能守道無爲則萬物自化君之無爲淳朴矣雨露報功清德水茅茨彰儉秀靈芝侯王若演無爲之化天必降河清芝秀之瑞也寰區自正恢皇化道經注云如能無爲夭下將自正正安定也高築興隆萬代基道經篇章玄頌卷上
